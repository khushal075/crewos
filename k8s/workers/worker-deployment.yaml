apiVersion: apps/v1
kind: Deployment
metadata:
  name: crewai-worker-default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crewai-worker
      tenant: default
  template:
    metadata:
      labels:
        app: crewai-worker
        tenant: default
    spec:
      containers:
        - name: worker
          image: crewai-platform:latest
          command:
            - poetry
            - run
            - worker
            - "-Q"
            - "crewai.default"
          envFrom:
            - configMapRef:
                name: crewai-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"